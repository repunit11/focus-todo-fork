services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: focus
      POSTGRES_PASSWORD: focus
      POSTGRES_DB: focus_todo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgres://focus:focus@db:5432/focus_todo?sslmode=disable
      GRPC_ADDR: :9090
      HTTP_ADDR: :8080
    depends_on:
      - db
    ports:
      - "8080:8080"
      - "9090:9090"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      GRPC_BACKEND_ADDR: backend:9090
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - ./proto:/proto

volumes:
  pgdata:
